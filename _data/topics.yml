# topics.yml — single source of truth for the 32 topic areas.
#
# Used by:
#   - js/overview.js TOPIC_COLORS map (slug-keyed)
#   - front-matter validator (categories[0] must match a slug)
#   - future Quarto include that emits the index.qmd topic-card grid
#
# Order here is the order shown in the index.qmd grid and the navbar.
# Slug must equal the directory under tutorials/.
# No counts: those come from artifacts/tutorials.csv at render time via
# _includes/live-counts.html.

topics:
  - slug: foundations
    display: Foundations
    blurb: Equilibrium concepts, information, repeated games, complexity — the formal core.

  - slug: classical-games
    display: Classical Games
    blurb: Prisoner's Dilemma, Hawk-Dove, oligopoly, bargaining, coordination — the canon.

  - slug: evolutionary-gt
    display: Evolutionary Game Theory
    blurb: Replicator dynamics, ESS, Moran processes, spatial games, co-evolution.

  - slug: cooperative-gt
    display: Cooperative Game Theory
    blurb: Shapley value, core, nucleolus, coalition formation, cost allocation.

  - slug: mechanism-design
    display: Mechanism Design
    blurb: VCG, auctions, matching, voting — designing the rules of the game.

  - slug: behavioral-gt
    display: Behavioral Game Theory
    blurb: Bounded rationality, QRE, level-k, social preferences, learning.

  - slug: simulations
    display: Simulations
    blurb: Monte Carlo, agent-based models, stochastic simulations, RL agents, tournaments.

  - slug: network-games
    display: Network Games
    blurb: Strategic network formation, diffusion, influence, centrality as power.

  - slug: case-studies
    display: Case Studies
    blurb: Cold War, OPEC, climate, market design, sports, poker — theory meets reality.

  - slug: ml-and-gt
    display: ML and Game Theory
    blurb: AlphaZero, CFR, multi-agent RL, GANs, adversarial robustness.

  - slug: auction-theory-deep-dive
    display: Auction Theory
    blurb: Revenue equivalence, Myerson optimal, combinatorial, GSP, empirical methods.

  - slug: decision-theory
    display: Decision Theory
    blurb: Expected utility, prospect theory, ambiguity, sequential and group decision.

  - slug: history-of-gt-mathematics
    display: History of Game Theory
    blurb: From Cournot 1838 through von Neumann, Nash, Selten, to modern Nobel laureates.

  - slug: cryptography-and-gt
    display: Cryptography & Game Theory
    blurb: Blockchain incentives, MEV, DeFi games, cryptographic protocols as games.

  - slug: experimental-economics
    display: Experimental Economics
    blurb: Lab and field experiments, oTree, classical replications, meta-analysis.

  - slug: real-world-data-applications
    display: Real-World Data Applications
    blurb: Empirical game theory with public historical data — trade, conflict, climate, health.

  - slug: ethics-and-game-theory
    display: Ethics and Game Theory
    blurb: Ethical dilemmas formalised, fairness, moral uncertainty, conventions, norms.

  - slug: ethics-applications
    display: Ethics Applications
    blurb: Algorithmic fairness, AI safety, bioethics, climate justice, digital ethics.

  - slug: public-apis-and-datasets
    display: Public APIs and Datasets
    blurb: World Bank, ACLED, NOAA, arXiv, Lichess — live data for game-theoretic analysis.

  - slug: ai-ml-foundations-and-applications
    display: AI/ML Foundations
    blurb: From perceptrons to transformers — history, theory, and R implementations.

  - slug: statistical-foundations
    display: Statistical Foundations
    blurb: Probability, inference, hypothesis testing, regression, nonparametrics.

  - slug: bayesian-methods
    display: Bayesian Methods
    blurb: Conjugate priors, MCMC, Stan, hierarchical models, Bayesian computation.

  - slug: optimization-numerical-methods
    display: Optimization & Numerical Methods
    blurb: Convex optimisation, LP, dynamic programming, gradient methods, fixed-point.

  - slug: causal-inference
    display: Causal Inference
    blurb: DAGs, potential outcomes, DiD, IV, RDD, synthetic control.

  - slug: time-series-econometrics
    display: Time Series & Econometrics
    blurb: ARIMA, VAR, cointegration, GARCH, structural breaks, panel data.

  - slug: linear-algebra-matrix
    display: Linear Algebra & Matrices
    blurb: Eigenvalues, SVD, positive definite matrices, Perron-Frobenius, graph Laplacians.

  - slug: information-theory
    display: Information Theory
    blurb: Entropy, mutual information, KL divergence, channel capacity, rate-distortion.

  - slug: network-science
    display: Network Science
    blurb: Random graphs, centrality, community detection, epidemics, igraph/tidygraph.

  - slug: behavioral-economics
    display: Behavioral Economics
    blurb: Prospect theory, nudges, heuristics, time preferences, social norms.

  - slug: visualization-and-communication
    display: Visualization & Communication
    blurb: Publication-ready ggplot2, plotly, game trees, network graphs, dashboards.

  - slug: r-package-development
    display: R Package Development
    blurb: Package structure, roxygen2, testthat, pkgdown, CRAN submission.

  - slug: reproducibility-open-science
    display: Reproducibility & Open Science
    blurb: Quarto, renv, targets, Docker, pre-registration, data sharing.
