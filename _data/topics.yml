# topics.yml — single source of truth for the 32 topic areas.
#
# Consumed by:
#   - R/build_artifacts.R: emitted into artifacts/graph.json topics[] for
#     the overview page (color + order drive the vis-network colour map
#     and legend ordering).
#   - R/check_frontmatter.R: slug set for categories[0] validation.
#   - _includes/live-counts.html: count chips on landing pages.

topics:
