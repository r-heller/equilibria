name: VG Wort gate
on:
  pull_request:
    branches: [main]

jobs:
  vgwort:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for TODO_IMPRESSUM
        run: |
          if grep -r "TODO_IMPRESSUM" impressum.qmd 2>/dev/null; then
            echo "::error::impressum.qmd still contains TODO_IMPRESSUM placeholder"
            exit 1
          fi
          echo "impressum.qmd OK"

      - name: Check for TODO_DATENSCHUTZ
        run: |
          if grep -r "TODO_DATENSCHUTZ" datenschutz.qmd 2>/dev/null; then
            echo "::error::datenschutz.qmd still contains TODO_DATENSCHUTZ placeholder"
            exit 1
          fi
          echo "datenschutz.qmd OK"

      - name: Warn on TODO_VGWORT placeholders
        run: |
          count=$(grep -r "TODO_VGWORT_" tutorials/ shiny/ 2>/dev/null | wc -l || echo 0)
          if [ "$count" -gt 0 ]; then
            echo "::warning::$count article(s) still have TODO_VGWORT placeholders"
            grep -r "TODO_VGWORT_" tutorials/ shiny/ 2>/dev/null || true
          else
            echo "All VG Wort pixels populated"
          fi
