name: API liveness check
on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 06:00 UTC
  workflow_dispatch:

jobs:
  check-apis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::yaml
            any::httr2

      - name: Check API endpoints from public-apis-and-datasets articles
        run: |
          Rscript -e '
          files <- list.files(
            "tutorials/public-apis-and-datasets",
            pattern = "\\.qmd$", recursive = TRUE, full.names = TRUE
          )
          files <- files[!grepl("tutorials/public-apis-and-datasets/index\\.qmd$", files)]

          if (length(files) == 0) {
            message("No API articles found yet.")
            quit(status = 0)
          }

          failures <- character(0)
          for (f in files) {
            lines <- readLines(f, warn = FALSE)
            if (lines[1] != "---") next
            end <- which(lines[-1] == "---")[1] + 1
            if (is.na(end)) next
            fm <- tryCatch(yaml::yaml.load(paste(lines[2:(end-1)], collapse="\n")), error=function(e) NULL)
            if (is.null(fm)) next

            url <- fm$api_or_dataset$endpoint_or_url
            if (is.null(url) || nchar(url) == 0) next

            resp <- tryCatch(
              httr2::request(url) |> httr2::req_method("HEAD") |> httr2::req_timeout(15) |> httr2::req_perform(),
              error = function(e) NULL
            )
            if (is.null(resp) || httr2::resp_status(resp) >= 400) {
              failures <- c(failures, paste0(fm$api_or_dataset$name %||% f, ": ", url))
            }
          }

          if (length(failures) > 0) {
            cat("DOWN APIs:\n", paste(failures, collapse="\n"), "\n")
            # Non-blocking — just warn
            message("::warning::", length(failures), " API(s) unreachable")
          } else {
            cat("All APIs reachable.\n")
          }
          '
