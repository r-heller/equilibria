name: Lighthouse a11y audit
on:
  workflow_dispatch:
  # Trigger automatically after a successful deploy. Comment in if/when
  # the live site is consistently reachable.
  # workflow_run:
  #   workflows: ["Publish site"]
  #   types: [completed]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://r-heller.github.io/equilibria/
            https://r-heller.github.io/equilibria/overview.html
            https://r-heller.github.io/equilibria/tutorials/foundations/nash-equilibrium-mixed/
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: ./.github/lighthouse/lighthouserc.json
