name: Character count gate
on:
  pull_request:
    paths:
      - 'tutorials/**/*.qmd'
      - 'shiny/tutorials/**/*.qmd'

jobs:
  charcount:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: any::yaml

      - name: Check character counts (>= 2500 prose chars)
        run: Rscript -e 'source("R/check_charcount.R"); check_all_articles()'
