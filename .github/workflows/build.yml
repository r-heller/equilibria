name: Build site
on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 1.9.37

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::tidyverse
            any::here
            any::knitr
            any::kableExtra
            any::plotly
            any::scales
            any::yaml
            any::jsonlite
            any::gridExtra
            any::R6
            any::deSolve
            any::fredr
            any::igraph
            any::lpSolve
            any::shiny
            any::downlit
            any::xml2

      - name: Build artifacts
        run: Rscript R/build_artifacts.R

      - name: Build decision tree
        run: Rscript R/build_decision_tree.R

      - name: Render site
        run: quarto render

      - name: Upload site preview
        uses: actions/upload-artifact@v4
        with:
          name: site-preview
          path: _site/
          retention-days: 7
