name: Rebuild artifacts
on:
  push:
    branches: [main]
    paths:
      - 'tutorials/**/*.qmd'
      - 'shiny/tutorials/**/*.qmd'
      - 'R/build_decision_tree.R'
      - 'R/build_artifacts.R'

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::yaml
            any::jsonlite

      - name: Rebuild graph.json, tutorials.csv, cooccurrence.csv
        run: Rscript R/build_artifacts.R

      - name: Rebuild decision-tree.json
        run: Rscript R/build_decision_tree.R

      - name: Commit updated artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add artifacts/
          if git diff --staged --quiet; then
            echo "No artifact changes"
          else
            git commit -m "chore: rebuild artifacts from tutorial frontmatter"
            git push
          fi
