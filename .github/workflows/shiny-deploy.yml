name: Deploy Shiny apps
on:
  push:
    branches: [main]
    paths:
      - 'shiny-apps/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Identify changed apps
        id: changed
        run: |
          changed=$(git diff --name-only HEAD~1 HEAD -- shiny-apps/ | cut -d'/' -f2 | sort -u)
          echo "apps=$changed" >> $GITHUB_OUTPUT
          echo "Changed apps: $changed"

      - name: Deploy to shinyapps.io
        if: steps.changed.outputs.apps != ''
        env:
          SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
          SHINYAPPS_NAME: ${{ secrets.SHINYAPPS_NAME }}
        run: |
          echo "Shiny deployment configured but secrets not yet set."
          echo "Set SHINYAPPS_TOKEN, SHINYAPPS_SECRET, SHINYAPPS_NAME in repo secrets."
          echo "Changed apps: ${{ steps.changed.outputs.apps }}"
