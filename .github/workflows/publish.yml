name: Publish site
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Legal-readiness gate
        run: |
          fail=0
          if grep -rq "TODO_IMPRESSUM" impressum.qmd 2>/dev/null; then
            echo "::error::impressum.qmd contains TODO_IMPRESSUM placeholder(s) — refusing to deploy"
            fail=1
          fi
          if grep -rq "TODO_DATENSCHUTZ" datenschutz.qmd 2>/dev/null; then
            echo "::error::datenschutz.qmd contains TODO_DATENSCHUTZ placeholder(s) — refusing to deploy"
            fail=1
          fi
          exit $fail

      - uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 1.9.37

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5.2'
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::tidyverse
            any::here
            any::knitr
            any::kableExtra
            any::plotly
            any::scales
            any::yaml
            any::jsonlite
            any::reticulate

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r python/requirements.txt

      - name: Render + publish to gh-pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
