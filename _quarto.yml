format:
  html:
    theme:
      light: [cosmo, theme-light.scss, styles.scss]
      dark: [darkly, theme-dark.scss, styles.scss]
    css: styles.scss
    toc: true
    toc-depth: 3
    code-fold: false
    code-tools: true
    code-link: true
    fig-cap-location: bottom
    tbl-cap-location: top
    citations-hover: true
    crossrefs-hover: true
    include-in-header:
      - file: _includes/vgwort.html
      - file: _includes/analytics.html
    include-before-body:
      - file: _includes/before-body.html
      - file: _includes/live-counts.html

bibliography: references.bib

execute:
  freeze: auto
  warning: false
  error: true       # Don't halt the build on individual chunk errors;
                    # errors render inline so the site still deploys
                    # while authors fix broken chunks. Out-of-scope
                    # content debugging per audit Hard Rule #3.
  message: false
