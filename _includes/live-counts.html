<script>
// live-counts.html — populates [data-topic-count] and #live-total-count
// spans from artifacts/tutorials.csv at render time.
// Fails silently (hides the span) if the CSV is unreachable, keeping
// pages free of empty "(undefined)" numerals.
(function() {
  async function fetchCsv() {
    const candidates = [
      'artifacts/tutorials.csv',
      '../artifacts/tutorials.csv',
      '../../artifacts/tutorials.csv',
      '../../../artifacts/tutorials.csv',
    ];
    for (const path of candidates) {
      try {
        const r = await fetch(path);
        if (r.ok) return await r.text();
      } catch (_) {
        // try next
      }
    }
    return null;
  }

  function parseTopics(csv) {
    const lines = csv.trim().split(/\r?\n/);
    if (lines.length < 2) return { total: 0, perTopic: {} };
    const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g, ''));
    const topicIdx = headers.indexOf('topic');
    if (topicIdx < 0) return { total: 0, perTopic: {} };
    const perTopic = {};
    let total = 0;
    for (let i = 1; i < lines.length; i++) {
      const cols = lines[i].split(',').map(c => c.replace(/^"|"$/g, ''));
      const topic = cols[topicIdx];
      if (!topic) continue;
      if (topic === 'shiny-tutorial') continue;  // exclude shiny tutorials from main count
      perTopic[topic] = (perTopic[topic] || 0) + 1;
      total++;
    }
    return { total, perTopic };
  }

  function applyCounts({ total, perTopic }) {
    const totalEl = document.getElementById('live-total-count');
    if (totalEl) totalEl.textContent = total.toString();
    document.querySelectorAll('[data-topic-count]').forEach(el => {
      const slug = el.getAttribute('data-topic-count');
      const n = perTopic[slug];
      if (n === undefined || n === 0) {
        // Hide the count chip if there's nothing to show
        const card = el.closest('.topic-card-label');
        if (card) card.style.display = 'none';
        else el.style.display = 'none';
        return;
      }
      el.textContent = n.toString();
    });
  }

  document.addEventListener('DOMContentLoaded', async () => {
    const csv = await fetchCsv();
    if (!csv) {
      // Hide everything; no numbers shown is preferable to wrong numbers
      const totalEl = document.getElementById('live-total-count');
      if (totalEl) totalEl.parentElement && (totalEl.parentElement.style.display = 'none');
      document.querySelectorAll('[data-topic-count]').forEach(el => {
        const card = el.closest('.topic-card-label');
        if (card) card.style.display = 'none';
        else el.style.display = 'none';
      });
      return;
    }
    applyCounts(parseTopics(csv));
  });
})();
</script>
