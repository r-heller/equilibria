<!-- VG Wort Zählmarke injection -->
<!-- The pixel URL is set per-article in frontmatter field `vgwort:` -->
<!-- At build time, a Lua filter reads the field and injects the <img> tag -->
<script>
  document.addEventListener('DOMContentLoaded', function() {
    const meta = document.querySelector('meta[name="vgwort"]');
    if (meta && meta.content && !meta.content.startsWith('TODO_VGWORT')) {
      const img = document.createElement('img');
      img.src = meta.content;
      img.width = 1;
      img.height = 1;
      img.alt = '';
      img.style.display = 'none';
      document.body.appendChild(img);
    }
  });
</script>
