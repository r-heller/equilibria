<script>
  // Persist user dark/light choice across navigation
  (function() {
    const stored = localStorage.getItem('quarto-color-scheme');
    if (stored && stored !== 'auto') {
      document.documentElement.setAttribute('data-bs-theme', stored);
    }
    document.addEventListener('DOMContentLoaded', function() {
      const toggleBtns = document.querySelectorAll('.quarto-color-scheme-toggle');
      toggleBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          const current = document.documentElement.getAttribute('data-bs-theme') || 'light';
          const next = current === 'light' ? 'dark' : 'light';
          localStorage.setItem('quarto-color-scheme', next);
        });
      });
    });
  })();
</script>
